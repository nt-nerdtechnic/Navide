name: Release macOS

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-macos-arm64:
    name: Test, sign, notarize, and release macOS arm64
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          uv --project backend sync --locked

      - name: Verify tag and version sources
        run: pnpm release:check "${GITHUB_REF_NAME}"

      - name: Run release gates
        run: |
          pnpm typecheck
          pnpm test:run
          uv --project backend run pytest backend/tests

      - name: Build Python backend
        working-directory: backend
        run: uv run pyinstaller agent_team_backend.spec

      - name: Prepare App Store Connect API key
        run: node -e "require('node:fs').writeFileSync(process.env.RUNNER_TEMP + '/AuthKey.p8', Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'))"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Build, sign, and notarize application
        run: |
          pnpm build
          pnpm exec electron-builder --mac --arm64 --publish never -c.forceCodeSigning=true
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Validate update artifacts
        shell: bash
        run: |
          test -f dist-release/latest-mac.yml
          test "$(find dist-release -maxdepth 1 -name 'Navide-*.dmg' | wc -l | tr -d ' ')" -eq 1
          test "$(find dist-release -maxdepth 1 -name 'Navide-*.zip' | wc -l | tr -d ' ')" -eq 1
          test "$(find dist-release -maxdepth 1 -name '*.blockmap' | wc -l | tr -d ' ')" -ge 1
          app_path="$(find dist-release -maxdepth 2 -name '*.app' -type d -print -quit)"
          test -n "${app_path}"
          codesign --verify --deep --strict --verbose=2 "${app_path}"
          xcrun stapler validate "${app_path}"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=()
          while IFS= read -r -d '' asset; do
            assets+=("${asset}")
          done < <(find dist-release -maxdepth 1 -type f \( -name 'Navide-*.dmg' -o -name 'Navide-*.zip' -o -name '*.blockmap' -o -name 'latest-mac.yml' \) -print0)
          test "${#assets[@]}" -ge 4
          gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --verify-tag --generate-notes --title "Navide ${GITHUB_REF_NAME}"
