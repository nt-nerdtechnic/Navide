name: Release macOS

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-macos-arm64:
    # v0.1.40 and v0.1.41 are manually published unsigned previews.
    if: github.ref_name != 'v0.1.40' && github.ref_name != 'v0.1.41'
    name: Test, sign, notarize, and release macOS arm64
    runs-on: macos-14
    timeout-minutes: 60
    environment:
      name: production
      url: https://github.com/nt-nerdtechnic/Navide/releases/latest

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          uv --project backend sync --locked

      - name: Verify tag and version sources
        run: pnpm release:check "${GITHUB_REF_NAME}"

      - name: Run release gates
        run: |
          pnpm typecheck
          pnpm test:run
          uv --project backend run pytest backend/tests

      - name: Build Python backend
        working-directory: backend
        run: uv run pyinstaller agent_team_backend.spec

      - name: Build application (unsigned)
        shell: bash
        run: |
          pnpm build
          # hdiutil on shared macOS runners intermittently fails to attach the
          # DMG staging image ("Device not configured"); retry absorbs it.
          for attempt in 1 2 3; do
            if pnpm exec electron-builder --mac --arm64 --publish never -c.mac.identity=null; then
              exit 0
            fi
            echo "electron-builder attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done
          echo "electron-builder failed after 3 attempts"
          exit 1
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Validate update artifacts
        shell: bash
        run: |
          test -f dist-release/latest-mac.yml
          test "$(find dist-release -maxdepth 1 -name 'Navide-*.dmg' | wc -l | tr -d ' ')" -eq 1
          test "$(find dist-release -maxdepth 1 -name 'Navide-*.zip' | wc -l | tr -d ' ')" -eq 1
          test "$(find dist-release -maxdepth 1 -name '*.blockmap' | wc -l | tr -d ' ')" -ge 2
          app_path="$(find dist-release -maxdepth 2 -name '*.app' -type d -print -quit)"
          test -n "${app_path}"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=()
          while IFS= read -r -d '' asset; do
            assets+=("${asset}")
          done < <(find dist-release -maxdepth 1 -type f \( -name 'Navide-*.dmg' -o -name 'Navide-*.zip' -o -name '*.blockmap' -o -name 'latest-mac.yml' \) -print0)
          test "${#assets[@]}" -ge 4
          # Idempotent publish: if the release already exists (e.g. published
          # manually or by a rerun), upload/replace assets instead of failing.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --verify-tag --prerelease --generate-notes --title "Navide ${GITHUB_REF_NAME}"
          fi
