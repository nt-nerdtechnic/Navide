name: Release macOS

on:
  push:
    tags:
      - 'v*.*.*'
  # Manual trigger to dry-run the signing & notarization chain without
  # publishing a release (build + sign + notarize + verify only).
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-macos-arm64:
    # v0.1.40, v0.1.41, and v0.1.49 are manually published unsigned previews
    # (v0.1.49: signing private key unavailable at release time).
    if: github.ref_name != 'v0.1.40' && github.ref_name != 'v0.1.41' && github.ref_name != 'v0.1.49'
    name: Test, sign, notarize, and release macOS arm64
    runs-on: macos-14
    timeout-minutes: 60
    environment:
      name: production
      url: https://github.com/nt-nerdtechnic/Navide/releases/latest

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          uv --project backend sync --locked

      - name: Verify tag and version sources
        if: github.event_name == 'push'
        run: pnpm release:check "${GITHUB_REF_NAME}"

      - name: Run release gates
        run: |
          pnpm typecheck
          pnpm test:run
          uv --project backend run pytest backend/tests

      - name: Build Python backend
        working-directory: backend
        run: uv run pyinstaller agent_team_backend.spec

      - name: Build, sign & notarize application
        shell: bash
        run: |
          pnpm build
          # hdiutil on shared macOS runners intermittently fails to attach the
          # DMG staging image ("Device not configured"); retry absorbs it.
          for attempt in 1 2 3; do
            if pnpm exec electron-builder --mac --arm64 --publish never; then
              exit 0
            fi
            echo "electron-builder attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done
          echo "electron-builder failed after 3 attempts"
          exit 1
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          # Developer ID signing (electron-builder imports the base64 .p12).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization credentials (mac.notarize: true in package.json).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify signature & notarization
        shell: bash
        run: |
          app_path="$(find dist-release -maxdepth 2 -name '*.app' -type d -print -quit)"
          test -n "${app_path}"
          echo "Verifying ${app_path}"
          # Signed with a valid Developer ID and the seal is intact.
          codesign --verify --deep --strict --verbose=2 "${app_path}"
          codesign --display --verbose=2 "${app_path}"
          # Gatekeeper accepts it for execution (requires notarization).
          spctl --assess --type execute --verbose=2 "${app_path}"
          # The notarization ticket is stapled to the app.
          stapler validate "${app_path}"

      - name: Validate update artifacts
        shell: bash
        run: |
          test -f dist-release/latest-mac.yml
          test "$(find dist-release -maxdepth 1 -name 'Navide-*.dmg' | wc -l | tr -d ' ')" -eq 1
          test "$(find dist-release -maxdepth 1 -name 'Navide-*.zip' | wc -l | tr -d ' ')" -eq 1
          test "$(find dist-release -maxdepth 1 -name '*.blockmap' | wc -l | tr -d ' ')" -ge 2
          app_path="$(find dist-release -maxdepth 2 -name '*.app' -type d -print -quit)"
          test -n "${app_path}"

      - name: Publish GitHub Release
        # Manual (workflow_dispatch) runs dry-run the signing chain only.
        if: github.event_name == 'push'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=()
          while IFS= read -r -d '' asset; do
            assets+=("${asset}")
          done < <(find dist-release -maxdepth 1 -type f \( -name 'Navide-*.dmg' -o -name 'Navide-*.zip' -o -name '*.blockmap' -o -name 'latest-mac.yml' \) -print0)
          test "${#assets[@]}" -ge 4
          # Idempotent publish: if the release already exists (e.g. published
          # manually or by a rerun), upload/replace assets instead of failing.
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${assets[@]}" --verify-tag --generate-notes --title "Navide ${GITHUB_REF_NAME}"
          fi
