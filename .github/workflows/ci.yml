name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test
    # macos-14 mirrors the release gates (release.yml); backend tests exercise
    # PTY/zsh behavior that only holds on macOS.
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          uv --project backend sync --locked

      - name: Lint backend (event-loop guardrail)
        run: uv --project backend run ruff check backend

      - name: Typecheck
        run: pnpm typecheck

      - name: Frontend tests
        run: pnpm test:run

      - name: Backend tests
        run: uv --project backend run pytest backend/tests
