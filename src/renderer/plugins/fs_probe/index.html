<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navide FS Probe Plugin</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #e6edf3;
        background: #161b22;
      }
      .wrap {
        box-sizing: border-box;
        height: 100%;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        overflow: auto;
      }
      h1 {
        margin: 0;
        font-size: 16px;
      }
      .alive {
        color: #3fb950;
        font-weight: 600;
      }
      label {
        display: block;
        font-size: 12px;
        color: #8b949e;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        background: #0d1117;
        color: #e6edf3;
        border: 1px solid #30363d;
        border-radius: 6px;
        font: inherit;
      }
      button {
        align-self: flex-start;
        padding: 6px 12px;
        background: #238636;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      pre {
        margin: 0;
        padding: 10px 12px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 6px;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1><span class="alive">●</span> FS probe plugin (requires: fs)</h1>
      <div>
        <label for="ws">workspace_path (absolute)</label>
        <input id="ws" placeholder="/Users/you/some/repo" />
      </div>
      <div>
        <label for="rel">rel_path</label>
        <input id="rel" value="package.json" />
      </div>
      <button id="read">fs.read_file</button>
      <div>Capability round-trip (<code>fs.read_file</code> over the backend WS):</div>
      <pre id="out">enter a workspace_path and click fs.read_file…</pre>
      <div>Server-push events (<code>git.changed</code>):</div>
      <pre id="events">waiting for git.changed…</pre>
    </div>
    <script type="module" src="./mount.ts"></script>
  </body>
</html>
