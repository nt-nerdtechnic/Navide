<!DOCTYPE html>
<html lang="en" data-theme="dark-github">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navide Mini-IDE Plugin</title>
    <style>
      html,
      body,
      #app {
        margin: 0;
        height: 100%;
      }
      #pre-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d1117;
      }
      #pre-splash .ps-spinner {
        width: 26px;
        height: 26px;
        border: 3px solid #30363d;
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: ps-spin 0.8s linear infinite;
      }
      @keyframes ps-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="pre-splash"><div class="ps-spinner"></div></div>
    </div>
    <script type="module" src="./mount.ts"></script>
  </body>
</html>
